<!DOCTYPE html>
<html lang="fr" data-theme="cyan">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Admin — Lexora</title>
<link rel="stylesheet" href="themes.css" />
<link rel="stylesheet" href="styles.css" />
<style>
  .admin-tabs { display: flex; gap: 8px; margin-bottom: 32px; }
  .admin-tab { padding: 10px 20px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; background: transparent; border: 1px solid var(--card-border); color: var(--text-secondary); cursor: pointer; }
  .admin-tab.active { background: var(--card-bg); color: var(--text-primary); border-color: rgba(var(--accent-1-rgb), 0.4); }
  .admin-panel { display: none; }
  .admin-panel.active { display: block; }
  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 12px 14px; border-bottom: 1px solid var(--card-border); }
  th { color: var(--text-secondary); font-weight: 600; font-size: 13px; }
  .status-badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .status-active { background: rgba(52,211,153,0.15); color: #34d399; }
  .status-suspended { background: rgba(248,113,113,0.15); color: #f87171; }
  .btn-sm { padding: 6px 12px; font-size: 12px; }
  .field-inline { display:flex; flex-direction:column; gap:6px; }
  .field-inline label { font-size: 12px; color: var(--text-secondary); font-weight:600; }
  .field-inline input { background: var(--bg-2); border:1px solid var(--card-border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text-primary); font-size:13px; }
  .form-grid { display:grid; grid-template-columns: repeat(2, 1fr); gap:14px; margin-bottom:14px; }
  .modal-overlay { position:fixed; inset:0; background:rgba(0,0,0,0.6); z-index:100; display:none; align-items:center; justify-content:center; padding:24px; }
  .modal-overlay.active { display:flex; }
  .modal-box { max-width: 640px; width:100%; max-height: 85vh; overflow-y:auto; }

  .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
  .stat-card .stat-label { font-size: 13px; color: var(--text-secondary); margin-bottom: 8px; }
  .stat-card .stat-value { font-size: 24px; font-weight: 800; }

  .chart-card { padding: 24px; margin-bottom: 32px; }
  .chart-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; flex-wrap: wrap; gap: 12px; }
  .chart-card-header h3 { font-size: 15px; font-weight: 700; }
  .metric-tabs { display: flex; gap: 4px; background: var(--bg-2); border: 1px solid var(--card-border); border-radius: 999px; padding: 3px; flex-wrap: wrap; }
  .metric-tab { font-size: 12px; font-weight: 600; padding: 7px 14px; border-radius: 999px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; white-space: nowrap; }
  .metric-tab.active { color: #05070d; background: linear-gradient(120deg, var(--accent-1), var(--accent-2)); }

  .bar-chart { display: flex; align-items: flex-end; gap: 4px; height: 160px; overflow-x: auto; }
  .bar-chart .bar-col { flex: 1; min-width: 14px; display: flex; flex-direction: column; align-items: center; gap: 6px; height: 100%; justify-content: flex-end; }
  .bar-chart .bar { width: 100%; max-width: 22px; border-radius: 4px 4px 0 0; background: linear-gradient(180deg, var(--accent-1), var(--accent-2)); min-height: 2px; }
  .bar-chart .bar-label { font-size: 9px; color: var(--text-muted); white-space: nowrap; }
  .chart-empty { color: var(--text-muted); font-size: 13px; text-align: center; padding: 40px 0; }

  .section-title { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
  .section-subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }

  .mini-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .mini-tab { padding: 8px 16px; border-radius: var(--radius-sm); font-size: 13px; font-weight: 600; background: transparent; border: 1px solid var(--card-border); color: var(--text-secondary); cursor: pointer; }
  .mini-tab.active { background: var(--card-bg); color: var(--text-primary); border-color: rgba(var(--accent-1-rgb), 0.4); }
  .mini-panel { display: none; }
  .mini-panel.active { display: block; }
</style>
</head>
<body>

<div class="bg-decor">
  <div class="bg-grid"></div>
  <div class="bg-chevrons">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M -20,20 L 220,500 L -20,980" />
      <path d="M 40,0 L 300,500 L 40,1000" />
      <path d="M 100,-20 L 380,500 L 100,1020" />
      <path d="M 160,-40 L 460,500 L 160,1040" />
      <path d="M 1020,20 L 780,500 L 1020,980" />
      <path d="M 960,0 L 700,500 L 960,1000" />
      <path d="M 900,-20 L 620,500 L 900,1020" />
      <path d="M 840,-40 L 540,500 L 840,1040" />
    </svg>
  </div>
  <div class="bg-aurora bg-aurora-1"></div>
  <div class="bg-aurora bg-aurora-2"></div>
  <div class="bg-aurora bg-aurora-3"></div>
  <canvas class="bg-particles"></canvas>
</div>

<section id="passwordGate" class="container flex-center" style="min-height: 100vh;">
  <div class="card accent-glow" style="width:100%; max-width:380px; padding:40px;">
    <h1 style="font-size:22px; font-weight:700; margin-bottom:20px; text-align:center;">Accès admin</h1>
    <div class="field">
      <label>Mot de passe admin</label>
      <input type="password" id="adminPasswordInput" autocomplete="off" />
    </div>
    <div id="gateError" class="error-msg"></div>
    <button class="btn btn-primary" id="gateSubmitBtn" style="width:100%; margin-top:8px;">Valider</button>
  </div>
</section>

<div id="adminContent" style="display:none;">
  <header class="navbar">
    <div class="container flex-between">
      <div class="navbar-left">
        <div class="logo gradient-text">Lexora</div>
        <div class="lang-select">
          <button class="lang-btn" data-lang="fr">FR</button>
          <button class="lang-btn" data-lang="en">EN</button>
        </div>
      </div>
      <div class="navbar-right">
        <div class="theme-dot-group" id="themeDotGroup"></div>
      </div>
    </div>
  </header>

  <main class="container" style="padding: 32px 24px 80px;">

    <!-- ===== VUE D'ENSEMBLE GLOBALE (tous affiliés confondus) ===== -->
    <div style="margin-bottom: 40px;">
      <div class="section-title gradient-text">Vue d'ensemble</div>
      <div class="section-subtitle">Toutes les affiliations confondues</div>

      <div class="stats-grid">
        <div class="card stat-card">
          <div class="stat-label">Total visites</div>
          <div class="stat-value" id="globalStatVisits">—</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Total ventes</div>
          <div class="stat-value" id="globalStatSales">—</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Total dû aux affiliés</div>
          <div class="stat-value" id="globalStatOwed">—</div>
        </div>
        <div class="card stat-card">
          <div class="stat-label">Total gagné</div>
          <div class="stat-value gradient-text" id="globalStatRevenue">—</div>
        </div>
      </div>

      <div class="card chart-card">
        <div class="chart-card-header">
          <h3>Activité par jour</h3>
          <div class="metric-tabs" id="globalMetricTabs">
            <button class="metric-tab active" data-metric="visits">Visites</button>
            <button class="metric-tab" data-metric="sales">Ventes</button>
            <button class="metric-tab" data-metric="owed">Dû aux affiliés</button>
            <button class="metric-tab" data-metric="revenue">Gains</button>
          </div>
        </div>
        <div id="globalChart"></div>
      </div>
    </div>

    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="admin">Admin</button>
      <button class="admin-tab" data-tab="noe">Noé</button>
      <button class="admin-tab" data-tab="raphael">Raphaël</button>
    </div>

    <!-- ===== ONGLET ADMIN ===== -->
    <section class="admin-panel active" id="panel-admin">
      <div class="card" style="margin-bottom: 24px;">
        <h3 style="font-size:16px; font-weight:700; margin-bottom:16px;">Créer un affilié</h3>
        <div class="form-grid">
          <div class="field-inline">
            <label>Prénom</label>
            <input type="text" id="newPrenom" placeholder="Lucas" />
          </div>
          <div class="field-inline">
            <label>Mot de passe</label>
            <input type="text" id="newPassword" placeholder="Mot de passe choisi avec lui" />
          </div>
          <div class="field-inline">
            <label>Lien Roulette</label>
            <input type="text" id="newLinkRoulette" placeholder="https://..." />
          </div>
          <div class="field-inline">
            <label>Lien Direct</label>
            <input type="text" id="newLinkDirect" placeholder="https://..." />
          </div>
          <div class="field-inline">
            <label>Commission par vente (€)</label>
            <input type="number" id="newCommission" placeholder="40" />
          </div>
        </div>
        <button class="btn btn-primary" id="createAffiliateBtn">Enregistrer</button>
        <div id="createResult" class="text-secondary" style="font-size:13px; margin-top:10px;"></div>
      </div>

      <div class="card" style="padding:0; overflow:hidden;">
        <table>
          <thead>
            <tr>
              <th>Prénom</th>
              <th>Commission</th>
              <th>Statut</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="affiliatesTableBody"></tbody>
        </table>
      </div>
    </section>

    <!-- ===== ONGLETS NOÉ / RAPHAËL ===== -->
    <section class="admin-panel" id="panel-noe">
      <div id="noe-content"></div>
    </section>
    <section class="admin-panel" id="panel-raphael">
      <div id="raphael-content"></div>
    </section>

  </main>
</div>

<!-- ===== MODAL : voir dashboard / modifier un affilié ===== -->
<div class="modal-overlay" id="affiliateModal">
  <div class="card modal-box" id="affiliateModalBody"></div>
</div>

<script src="lang.js"></script>
<script src="decor.js"></script>
<script>
  const THEMES = ["cyan", "violet", "emerald", "rose", "amber", "indigo"];
  const THEME_STORAGE_KEY = "site_theme";
  function getCurrentTheme() { return localStorage.getItem(THEME_STORAGE_KEY) || "cyan"; }
  function setCurrentTheme(theme) {
    localStorage.setItem(THEME_STORAGE_KEY, theme);
    document.documentElement.setAttribute("data-theme", theme);
    updateThemeDots();
  }
  function updateThemeDots() {
    const current = getCurrentTheme();
    document.querySelectorAll(".theme-dot").forEach((dot) => {
      dot.classList.toggle("active", dot.getAttribute("data-theme-value") === current);
    });
  }
  function initThemeSelector() {
    const group = document.getElementById("themeDotGroup");
    const dotColors = { cyan:"#22d3ee", violet:"#a78bfa", emerald:"#34d399", rose:"#fb7185", amber:"#fbbf24", indigo:"#818cf8" };
    THEMES.forEach((theme) => {
      const dot = document.createElement("button");
      dot.className = "theme-dot";
      dot.setAttribute("data-theme-value", theme);
      dot.style.background = dotColors[theme];
      dot.addEventListener("click", () => setCurrentTheme(theme));
      group.appendChild(dot);
    });
    document.documentElement.setAttribute("data-theme", getCurrentTheme());
    updateThemeDots();
  }

  const ADMIN_SESSION_KEY = "admin_authenticated";
  const gateSubmitBtn = document.getElementById("gateSubmitBtn");
  const gateError = document.getElementById("gateError");

  async function submitAdminPassword() {
    const password = document.getElementById("adminPasswordInput").value;
    gateError.classList.remove("visible");
    gateSubmitBtn.disabled = true;

    try {
      const res = await fetch("/.netlify/functions/admin-auth", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ password }),
      });

      if (!res.ok) {
        gateError.textContent = "Mot de passe incorrect.";
        gateError.classList.add("visible");
        gateSubmitBtn.disabled = false;
        return;
      }

      const { token } = await res.json();
      sessionStorage.setItem(ADMIN_SESSION_KEY, token);
      showAdminContent();
    } catch (err) {
      console.error(err);
      gateError.textContent = "Erreur serveur, réessaie.";
      gateError.classList.add("visible");
      gateSubmitBtn.disabled = false;
    }
  }

  gateSubmitBtn.addEventListener("click", submitAdminPassword);
  document.getElementById("adminPasswordInput").addEventListener("keydown", (e) => {
    if (e.key === "Enter") submitAdminPassword();
  });

  function adminHeaders() {
    return {
      "Content-Type": "application/json",
      "Authorization": `Bearer ${sessionStorage.getItem(ADMIN_SESSION_KEY)}`,
    };
  }

  // ===== Graphique en barres réutilisable (vue d'ensemble + mini-dashboards) =====
  function renderBarChart(containerEl, days, valueKey, formatFn) {
    containerEl.innerHTML = "";
    if (!days || days.length === 0) {
      const empty = document.createElement("div");
      empty.className = "chart-empty";
      empty.textContent = "Pas encore de données sur cette période.";
      containerEl.appendChild(empty);
      return;
    }
    const format = formatFn || ((v) => v);
    const maxVal = Math.max(1, ...days.map((d) => d[valueKey]));
    const wrap = document.createElement("div");
    wrap.className = "bar-chart";
    days.forEach((d) => {
      const col = document.createElement("div");
      col.className = "bar-col";
      const bar = document.createElement("div");
      bar.className = "bar";
      const heightPct = Math.max(2, (d[valueKey] / maxVal) * 100);
      bar.style.height = heightPct + "%";
      const dateLabel = new Date(d.date).toLocaleDateString();
      bar.title = `${dateLabel} — ${format(d[valueKey])}`;
      const label = document.createElement("div");
      label.className = "bar-label";
      label.textContent = new Date(d.date).toLocaleDateString(undefined, { day: "2-digit", month: "2-digit" });
      col.appendChild(bar);
      col.appendChild(label);
      wrap.appendChild(col);
    });
    containerEl.appendChild(wrap);
  }

  // Ne garde que les N derniers jours d'une série "daily" renvoyée par le back
  function lastNDays(daily, n) {
    if (!daily) return [];
    return daily.slice(-n);
  }

  // ===== Vue d'ensemble globale =====
  let cachedGlobalDaily = [];

  async function loadGlobalStats() {
    try {
      const res = await fetch("/.netlify/functions/admin-stats", {
        method: "POST",
        headers: adminHeaders(),
      });
      if (!res.ok) return;

      const { totals, daily } = await res.json();
      cachedGlobalDaily = daily || [];

      document.getElementById("globalStatVisits").textContent = totals.totalVisits;
      document.getElementById("globalStatSales").textContent = totals.totalSales;
      document.getElementById("globalStatOwed").textContent = totals.totalOwed.toFixed(2) + "€";
      document.getElementById("globalStatRevenue").textContent = totals.totalRevenue.toFixed(2) + "€";

      renderGlobalChart("visits");
    } catch (err) {
      console.error(err);
    }
  }

  function renderGlobalChart(metric) {
    const days = lastNDays(cachedGlobalDaily, 30);
    const formatters = {
      visits: (v) => `${v} visite(s)`,
      sales: (v) => `${v} vente(s)`,
      owed: (v) => `${v.toFixed(2)}€ dû(s)`,
      revenue: (v) => `${v.toFixed(2)}€ gagné(s)`,
    };
    renderBarChart(document.getElementById("globalChart"), days, metric, formatters[metric]);
  }

  function initGlobalMetricTabs() {
    document.querySelectorAll("#globalMetricTabs .metric-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll("#globalMetricTabs .metric-tab").forEach((t) => t.classList.remove("active"));
        tab.classList.add("active");
        renderGlobalChart(tab.getAttribute("data-metric"));
      });
    });
  }

  function showAdminContent() {
    document.getElementById("passwordGate").style.display = "none";
    document.getElementById("adminContent").style.display = "block";
    initThemeSelector();
    initAdminTabs();
    initGlobalMetricTabs();
    loadGlobalStats();
    loadAffiliatesTable();
    loadSpecialAffiliatePanel("noe", "noe-content");
    loadSpecialAffiliatePanel("raphael", "raphael-content");
  }

  function initAdminTabs() {
    document.querySelectorAll(".admin-tab").forEach((tab) => {
      tab.addEventListener("click", () => {
        document.querySelectorAll(".admin-tab").forEach((t) => t.classList.remove("active"));
        document.querySelectorAll(".admin-panel").forEach((p) => p.classList.remove("active"));
        tab.classList.add("active");
        document.getElementById("panel-" + tab.getAttribute("data-tab")).classList.add("active");
      });
    });
  }

  // ===== Créer un affilié =====
  document.getElementById("createAffiliateBtn").addEventListener("click", async () => {
    const prenom = document.getElementById("newPrenom").value.trim();
    const password = document.getElementById("newPassword").value.trim();
    const linkRoulette = document.getElementById("newLinkRoulette").value.trim();
    const linkDirect = document.getElementById("newLinkDirect").value.trim();
    const commissionAmount = document.getElementById("newCommission").value.trim();
    const resultBox = document.getElementById("createResult");

    if (!prenom || !password || !linkRoulette || !linkDirect || !commissionAmount) {
      resultBox.textContent = "Tous les champs sont obligatoires.";
      resultBox.style.color = "#f87171";
      return;
    }

    resultBox.style.color = "";
    resultBox.textContent = "Enregistrement en cours...";

    try {
      const res = await fetch("/.netlify/functions/admin-save-affiliate", {
        method: "POST",
        headers: adminHeaders(),
        body: JSON.stringify({ prenom, password, linkRoulette, linkDirect, commissionAmount }),
      });

      if (!res.ok) {
        const errText = await res.text();
        resultBox.textContent = res.status === 409 ? "Ce prénom est déjà utilisé." : "Erreur : " + errText;
        resultBox.style.color = "#f87171";
        return;
      }

      resultBox.textContent = "Affilié créé ✔";
      document.getElementById("newPrenom").value = "";
      document.getElementById("newPassword").value = "";
      document.getElementById("newLinkRoulette").value = "";
      document.getElementById("newLinkDirect").value = "";
      document.getElementById("newCommission").value = "";
      loadAffiliatesTable();
    } catch (err) {
      console.error(err);
      resultBox.textContent = "Erreur lors de la création.";
      resultBox.style.color = "#f87171";
    }
  });

  // ===== Tableau des affiliés =====
  async function loadAffiliatesTable() {
    try {
      const res = await fetch("/.netlify/functions/admin-list-affiliates", {
        method: "POST",
        headers: adminHeaders(),
      });
      if (!res.ok) return;

      const { affiliates } = await res.json();
      const tbody = document.getElementById("affiliatesTableBody");
      tbody.innerHTML = "";

      affiliates.forEach((a) => {
        const isActive = a.statut === "actif";
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${a.prenom}</td>
          <td>${a.commission_amount}€</td>
          <td><span class="status-badge ${isActive ? "status-active" : "status-suspended"}">${isActive ? "Actif" : "Suspendu"}</span></td>
          <td style="display:flex; gap:6px; flex-wrap:wrap;">
            <button class="btn btn-outline btn-sm" data-action="view" data-id="${a.id}">Voir dashboard</button>
            <button class="btn btn-outline btn-sm" data-action="edit" data-id="${a.id}">Modifier</button>
            <button class="btn btn-outline btn-sm" data-action="toggle" data-id="${a.id}" data-status="${a.statut}">${isActive ? "Suspendre" : "Réactiver"}</button>
            <button class="btn btn-outline btn-sm" data-action="delete" data-id="${a.id}" style="color:#f87171;">Supprimer</button>
          </td>
        `;
        tbody.appendChild(tr);
      });

      tbody.querySelectorAll("button[data-action='view']").forEach((btn) =>
        btn.addEventListener("click", () => openAffiliateModal(btn.getAttribute("data-id"), "view"))
      );
      tbody.querySelectorAll("button[data-action='edit']").forEach((btn) =>
        btn.addEventListener("click", () => openAffiliateModal(btn.getAttribute("data-id"), "edit"))
      );
      tbody.querySelectorAll("button[data-action='toggle']").forEach((btn) =>
        btn.addEventListener("click", () => toggleAffiliateStatus(btn))
      );
      tbody.querySelectorAll("button[data-action='delete']").forEach((btn) =>
        btn.addEventListener("click", () => deleteAffiliate(btn.getAttribute("data-id")))
      );
    } catch (err) {
      console.error(err);
    }
  }

  async function toggleAffiliateStatus(btn) {
    const userId = btn.getAttribute("data-id");
    const currentStatus = btn.getAttribute("data-status");
    const newStatus = currentStatus === "actif" ? "suspendu" : "actif";
    btn.disabled = true;

    try {
      const res = await fetch("/.netlify/functions/admin-toggle-user", {
        method: "POST",
        headers: adminHeaders(),
        body: JSON.stringify({ userId, newStatus }),
      });
      if (!res.ok) throw new Error("Échec");
      loadAffiliatesTable();
    } catch (err) {
      console.error(err);
      alert("Erreur lors du changement de statut.");
      btn.disabled = false;
    }
  }

  async function deleteAffiliate(id) {
    if (!confirm("Supprimer définitivement cet affilié ? Cette action est irréversible.")) return;
    try {
      const res = await fetch("/.netlify/functions/admin-delete-affiliate", {
        method: "POST",
        headers: adminHeaders(),
        body: JSON.stringify({ id }),
      });
      if (!res.ok) throw new Error("Échec");
      loadAffiliatesTable();
    } catch (err) {
      console.error(err);
      alert("Erreur lors de la suppression.");
    }
  }

  // ===== Modal : voir dashboard OU modifier =====
  async function openAffiliateModal(affiliateId, mode) {
    const overlay = document.getElementById("affiliateModal");
    const box = document.getElementById("affiliateModalBody");
    box.innerHTML = "<p style='padding:24px;'>Chargement...</p>";
    overlay.classList.add("active");

    try {
      const res = await fetch("/.netlify/functions/admin-get-affiliate-data", {
        method: "POST",
        headers: adminHeaders(),
        body: JSON.stringify({ affiliateId }),
      });
      if (!res.ok) {
        box.innerHTML = "<p style='padding:24px;'>Erreur de chargement.</p>";
        return;
      }
      const { affiliate, stats, sales } = await res.json();

      if (mode === "view") {
        renderViewModal(box, affiliate, stats, sales);
      } else {
        renderEditModal(box, affiliate);
      }
    } catch (err) {
      console.error(err);
      box.innerHTML = "<p style='padding:24px;'>Erreur.</p>";
    }
  }

  function renderViewModal(box, affiliate, stats, sales) {
    const rows = sales.map((s) => `<tr><td>${new Date(s.created_at).toLocaleDateString()}</td><td>${s.amount}€</td><td>${s.commission}€</td></tr>`).join("");
    box.innerHTML = `
      <div style="padding:28px;">
        <div class="flex-between" style="margin-bottom:20px;">
          <h2 style="font-size:20px; font-weight:700;">Dashboard de ${affiliate.prenom}</h2>
          <button class="btn btn-outline btn-sm" id="closeModalBtn">Fermer</button>
        </div>
        <div class="stats-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:20px;">
          <div class="card"><div class="text-secondary" style="font-size:12px;">Ventes</div><div style="font-size:22px; font-weight:800;">${stats.totalSales}</div></div>
          <div class="card"><div class="text-secondary" style="font-size:12px;">Gains</div><div style="font-size:22px; font-weight:800;" class="gradient-text">${stats.totalEarnings}€</div></div>
          <div class="card"><div class="text-secondary" style="font-size:12px;">Commission/vente</div><div style="font-size:22px; font-weight:800;" class="gradient-text">${affiliate.commission_amount}€</div></div>
        </div>
        <div class="field-inline" style="margin-bottom:10px;"><label>Lien Roulette</label><div class="link-box" style="margin-top:4px;">${affiliate.link_roulette}</div></div>
        <div class="field-inline" style="margin-bottom:16px;"><label>Lien Direct</label><div class="link-box" style="margin-top:4px;">${affiliate.link_direct}</div></div>
        <table>
          <thead><tr><th>Date</th><th>Montant payé</th><th>Commission</th></tr></thead>
          <tbody>${rows || '<tr><td colspan="3" class="text-muted" style="text-align:center; padding:16px;">Aucune vente</td></tr>'}</tbody>
        </table>
      </div>
    `;
    document.getElementById("closeModalBtn").addEventListener("click", closeAffiliateModal);
  }

  function renderEditModal(box, affiliate) {
    box.innerHTML = `
      <div style="padding:28px;">
        <div class="flex-between" style="margin-bottom:20px;">
          <h2 style="font-size:20px; font-weight:700;">Modifier ${affiliate.prenom}</h2>
          <button class="btn btn-outline btn-sm" id="closeModalBtn">Fermer</button>
        </div>
        <div class="form-grid">
          <div class="field-inline"><label>Prénom</label><input type="text" id="editPrenom" value="${affiliate.prenom}" /></div>
          <div class="field-inline"><label>Nouveau mot de passe (vide = inchangé)</label><input type="text" id="editPassword" placeholder="Laisser vide pour ne pas changer" /></div>
          <div class="field-inline"><label>Lien Roulette</label><input type="text" id="editLinkRoulette" value="${affiliate.link_roulette}" /></div>
          <div class="field-inline"><label>Lien Direct</label><input type="text" id="editLinkDirect" value="${affiliate.link_direct}" /></div>
          <div class="field-inline"><label>Commission (€)</label><input type="number" id="editCommission" value="${affiliate.commission_amount}" /></div>
        </div>
        <button class="btn btn-primary" id="saveEditBtn">Enregistrer les modifications</button>
        <div id="editResult" class="text-secondary" style="font-size:13px; margin-top:10px;"></div>
      </div>
    `;
    document.getElementById("closeModalBtn").addEventListener("click", closeAffiliateModal);
    document.getElementById("saveEditBtn").addEventListener("click", () => saveAffiliateEdit(affiliate.id));
  }

  async function saveAffiliateEdit(id) {
    const prenom = document.getElementById("editPrenom").value.trim();
    const password = document.getElementById("editPassword").value.trim();
    const linkRoulette = document.getElementById("editLinkRoulette").value.trim();
    const linkDirect = document.getElementById("editLinkDirect").value.trim();
    const commissionAmount = document.getElementById("editCommission").value.trim();
    const resultBox = document.getElementById("editResult");

    if (!prenom || !linkRoulette || !linkDirect || !commissionAmount) {
      resultBox.textContent = "Tous les champs (sauf mot de passe) sont obligatoires.";
      resultBox.style.color = "#f87171";
      return;
    }

    try {
      const body = { id, prenom, linkRoulette, linkDirect, commissionAmount };
      if (password) body.password = password;

      const res = await fetch("/.netlify/functions/admin-save-affiliate", {
        method: "POST",
        headers: adminHeaders(),
        body: JSON.stringify(body),
      });

      if (!res.ok) {
        resultBox.textContent = "Erreur lors de la modification.";
        resultBox.style.color = "#f87171";
        return;
      }

      resultBox.style.color = "";
      resultBox.textContent = "Modifié ✔";
      loadAffiliatesTable();
      setTimeout(closeAffiliateModal, 800);
    } catch (err) {
      console.error(err);
      resultBox.textContent = "Erreur.";
      resultBox.style.color = "#f87171";
    }
  }

  function closeAffiliateModal() {
    document.getElementById("affiliateModal").classList.remove("active");
  }

  // ===== Panneaux Noé / Raphaël : mini-dashboard complet (Dashboard / Mes liens / Profil) =====
  async function loadSpecialAffiliatePanel(prenom, containerId) {
    const container = document.getElementById(containerId);
    try {
      const res = await fetch("/.netlify/functions/admin-list-affiliates", { method: "POST", headers: adminHeaders() });
      if (!res.ok) return;
      const { affiliates } = await res.json();
      const match = affiliates.find((a) => a.prenom.toLowerCase() === prenom.toLowerCase());

      if (!match) {
        container.innerHTML = `<p class="text-secondary">Aucun compte "${prenom}" trouvé. Crée-le d'abord dans l'onglet Admin avec ce prénom exact.</p>`;
        return;
      }

      const dataRes = await fetch("/.netlify/functions/admin-get-affiliate-data", {
        method: "POST",
        headers: adminHeaders(),
        body: JSON.stringify({ affiliateId: match.id }),
      });
      const { affiliate, stats, sales, visits } = await dataRes.json();

      const totalVisits = (visits || []).length;
      const conversion = totalVisits > 0 ? ((stats.totalSales / totalVisits) * 100).toFixed(1) + "%" : "—";

      container.innerHTML = `
        <div class="mini-tabs">
          <button class="mini-tab active" data-mini="dashboard">Dashboard</button>
          <button class="mini-tab" data-mini="links">Mes liens</button>
          <button class="mini-tab" data-mini="profile">Profil</button>
        </div>

        <div class="mini-panel active" id="${containerId}-panel-dashboard">
          <div class="stats-grid" style="grid-template-columns:repeat(4,1fr);">
            <div class="card stat-card"><div class="stat-label">Visites</div><div class="stat-value">${totalVisits}</div></div>
            <div class="card stat-card"><div class="stat-label">Ventes</div><div class="stat-value">${stats.totalSales}</div></div>
            <div class="card stat-card"><div class="stat-label">Taux de conversion</div><div class="stat-value">${conversion}</div></div>
            <div class="card stat-card"><div class="stat-label">Gains</div><div class="stat-value gradient-text">${Number(stats.totalEarnings).toFixed(2)}€</div></div>
          </div>
          <div class="card chart-card">
            <div class="chart-card-header"><h3>Activité par jour</h3></div>
            <div id="${containerId}-chart"></div>
          </div>
        </div>

        <div class="mini-panel" id="${containerId}-panel-links">
          <div class="card" style="margin-bottom:14px;">
            <div class="field-inline"><label>Lien Roulette</label>
              <div style="display:flex; gap:8px; margin-top:6px;">
                <input type="text" id="${containerId}-roulette" value="${affiliate.link_roulette}" style="flex:1; background: var(--bg-2); border:1px solid var(--card-border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text-primary); font-size:13px;" />
                <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('${containerId}-roulette').value)">Copier</button>
              </div>
            </div>
          </div>
          <div class="card" style="margin-bottom:14px;">
            <div class="field-inline"><label>Lien Direct</label>
              <div style="display:flex; gap:8px; margin-top:6px;">
                <input type="text" id="${containerId}-direct" value="${affiliate.link_direct}" style="flex:1; background: var(--bg-2); border:1px solid var(--card-border); border-radius: var(--radius-sm); padding: 10px 12px; color: var(--text-primary); font-size:13px;" />
                <button class="btn btn-outline btn-sm" onclick="navigator.clipboard.writeText(document.getElementById('${containerId}-direct').value)">Copier</button>
              </div>
            </div>
          </div>
          <button class="btn btn-primary" id="${containerId}-save-links">Enregistrer mes liens</button>
          <div id="${containerId}-links-result" class="text-secondary" style="font-size:13px; margin-top:10px;"></div>
        </div>

        <div class="mini-panel" id="${containerId}-panel-profile">
          <div class="card" style="max-width:480px;">
            <div class="form-grid">
              <div class="field-inline"><label>Prénom</label><input type="text" id="${containerId}-prenom" value="${affiliate.prenom}" /></div>
              <div class="field-inline"><label>Nouveau mot de passe (vide = inchangé)</label><input type="text" id="${containerId}-password" placeholder="Laisser vide pour ne pas changer" /></div>
              <div class="field-inline"><label>Commission par vente (€)</label><input type="number" id="${containerId}-commission" value="${affiliate.commission_amount}" /></div>
            </div>
            <button class="btn btn-primary" id="${containerId}-save-profile">Enregistrer le profil</button>
            <div id="${containerId}-profile-result" class="text-secondary" style="font-size:13px; margin-top:10px;"></div>
          </div>
        </div>
      `;

      // Rendu du graphique (14 derniers jours), défensif si les dates manquent
      const dayMap = {};
      const today = new Date();
      for (let i = 13; i >= 0; i--) {
        const d = new Date(today);
        d.setDate(d.getDate() - i);
        const key = d.toISOString().slice(0, 10);
        dayMap[key] = { date: key, visits: 0 };
      }
      (visits || []).forEach((v) => {
        if (!v.created_at) return;
        const key = new Date(v.created_at).toISOString().slice(0, 10);
        if (dayMap[key]) dayMap[key].visits += 1;
      });
      renderBarChart(document.getElementById(`${containerId}-chart`), Object.values(dayMap), "visits", (v) => `${v} visite(s)`);

      // Onglets internes du mini-dashboard
      container.querySelectorAll(".mini-tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          container.querySelectorAll(".mini-tab").forEach((t) => t.classList.remove("active"));
          container.querySelectorAll(".mini-panel").forEach((p) => p.classList.remove("active"));
          tab.classList.add("active");
          document.getElementById(`${containerId}-panel-${tab.getAttribute("data-mini")}`).classList.add("active");
        });
      });

      // Sauvegarde des liens
      document.getElementById(`${containerId}-save-links`).addEventListener("click", async () => {
        const linkRoulette = document.getElementById(`${containerId}-roulette`).value.trim();
        const linkDirect = document.getElementById(`${containerId}-direct`).value.trim();
        const resultBox = document.getElementById(`${containerId}-links-result`);

        const saveRes = await fetch("/.netlify/functions/admin-save-affiliate", {
          method: "POST",
          headers: adminHeaders(),
          body: JSON.stringify({
            id: affiliate.id,
            prenom: affiliate.prenom,
            linkRoulette,
            linkDirect,
            commissionAmount: affiliate.commission_amount,
          }),
        });

        resultBox.textContent = saveRes.ok ? "Liens mis à jour ✔" : "Erreur lors de la mise à jour.";
        resultBox.style.color = saveRes.ok ? "" : "#f87171";
      });

      // Sauvegarde du profil (prénom / mot de passe / commission)
      document.getElementById(`${containerId}-save-profile`).addEventListener("click", async () => {
        const newPrenom = document.getElementById(`${containerId}-prenom`).value.trim();
        const newPassword = document.getElementById(`${containerId}-password`).value.trim();
        const newCommission = document.getElementById(`${containerId}-commission`).value.trim();
        const resultBox = document.getElementById(`${containerId}-profile-result`);

        if (!newPrenom || !newCommission) {
          resultBox.textContent = "Prénom et commission sont obligatoires.";
          resultBox.style.color = "#f87171";
          return;
        }

        const body = {
          id: affiliate.id,
          prenom: newPrenom,
          linkRoulette: affiliate.link_roulette,
          linkDirect: affiliate.link_direct,
          commissionAmount: newCommission,
        };
        if (newPassword) body.password = newPassword;

        const saveRes = await fetch("/.netlify/functions/admin-save-affiliate", {
          method: "POST",
          headers: adminHeaders(),
          body: JSON.stringify(body),
        });

        if (!saveRes.ok) {
          resultBox.textContent = "Erreur lors de la mise à jour.";
          resultBox.style.color = "#f87171";
          return;
        }

        resultBox.style.color = "";
        resultBox.textContent = "Profil mis à jour ✔";
        loadAffiliatesTable();
      });
    } catch (err) {
      console.error(err);
      container.innerHTML = `<p class="text-secondary">Erreur de chargement.</p>`;
    }
  }

  document.addEventListener("DOMContentLoaded", () => {
    if (sessionStorage.getItem(ADMIN_SESSION_KEY)) {
      showAdminContent();
    }
  });
</script>

</body>
</html>
