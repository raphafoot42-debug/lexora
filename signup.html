<!DOCTYPE html>
<html lang="fr" data-theme="cyan">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Connexion / Inscription — Programme de parrainage</title>
<link rel="stylesheet" href="themes.css" />
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="bg-decor">
  <div class="bg-grid"></div>
  <div class="bg-chevrons">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M -20,20 L 220,500 L -20,980" />
      <path d="M 40,0 L 300,500 L 40,1000" />
      <path d="M 100,-20 L 380,500 L 100,1020" />
      <path d="M 160,-40 L 460,500 L 160,1040" />
      <path d="M 1020,20 L 780,500 L 1020,980" />
      <path d="M 960,0 L 700,500 L 960,1000" />
      <path d="M 900,-20 L 620,500 L 900,1020" />
      <path d="M 840,-40 L 540,500 L 840,1040" />
    </svg>
  </div>
  <div class="bg-aurora bg-aurora-1"></div>
  <div class="bg-aurora bg-aurora-2"></div>
  <div class="bg-aurora bg-aurora-3"></div>
  <canvas class="bg-particles"></canvas>
</div>

<header class="navbar">
  <div class="container flex-between">
    <div class="navbar-left">
      <a href="index.html" class="logo gradient-text">Lexora</a>
      <div class="lang-select">
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
    <div class="navbar-right">
      <div class="theme-dot-group" id="themeDotGroup"></div>
    </div>
  </div>
</header>

<section class="container flex-center" style="min-height: 80vh; padding: 40px 24px;">
  <div class="card accent-glow" style="width: 100%; max-width: 420px; padding: 40px;">

    <h1 id="formTitle" style="font-size: 24px; font-weight: 700; margin-bottom: 24px; text-align:center;" data-i18n="auth.login_title">Connexion</h1>

    <form id="authForm">
      <div class="field">
        <label data-i18n="auth.email">Adresse email</label>
        <input type="email" id="email" required autocomplete="email" />
      </div>
      <div class="field">
        <label data-i18n="auth.password">Mot de passe</label>
        <input type="password" id="password" required autocomplete="current-password" minlength="6" />
      </div>

      <div id="errorMsg" class="error-msg"></div>

      <button type="submit" id="submitBtn" class="btn btn-primary" style="width:100%; margin-top: 8px;" data-i18n="auth.login_btn">
        Se connecter
      </button>
    </form>

    <div class="text-center" style="margin-top: 20px;">
      <a href="#" id="switchModeLink" class="text-secondary" style="font-size: 14px;" data-i18n="auth.switch_to_signup">
        Pas encore de compte ? Inscris-toi
      </a>
    </div>

  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="lang.js"></script>
<script src="decor.js"></script>
<script>
  // ---------- Thème ----------
  const THEMES = ["cyan", "violet", "emerald", "rose", "amber", "indigo"];
  const THEME_STORAGE_KEY = "site_theme";

  function getCurrentTheme() {
    return localStorage.getItem(THEME_STORAGE_KEY) || "cyan";
  }
  function setCurrentTheme(theme) {
    localStorage.setItem(THEME_STORAGE_KEY, theme);
    document.documentElement.setAttribute("data-theme", theme);
    updateThemeDots();
  }
  function updateThemeDots() {
    const current = getCurrentTheme();
    document.querySelectorAll(".theme-dot").forEach((dot) => {
      dot.classList.toggle("active", dot.getAttribute("data-theme-value") === current);
    });
  }
  function initThemeSelector() {
    const group = document.getElementById("themeDotGroup");
    const dotColors = {
      cyan: "#22d3ee", violet: "#a78bfa", emerald: "#34d399",
      rose: "#fb7185", amber: "#fbbf24", indigo: "#818cf8",
    };
    THEMES.forEach((theme) => {
      const dot = document.createElement("button");
      dot.className = "theme-dot";
      dot.setAttribute("data-theme-value", theme);
      dot.style.background = dotColors[theme];
      dot.addEventListener("click", () => setCurrentTheme(theme));
      group.appendChild(dot);
    });
    document.documentElement.setAttribute("data-theme", getCurrentTheme());
    updateThemeDots();
  }

  // ---------- Auth : bascule connexion / inscription ----------
  let mode = "login"; // "login" | "signup"

  const formTitle = document.getElementById("formTitle");
  const submitBtn = document.getElementById("submitBtn");
  const switchModeLink = document.getElementById("switchModeLink");
  const errorMsg = document.getElementById("errorMsg");
  const authForm = document.getElementById("authForm");

  function updateFormMode() {
    if (mode === "login") {
      formTitle.setAttribute("data-i18n", "auth.login_title");
      submitBtn.setAttribute("data-i18n", "auth.login_btn");
      switchModeLink.setAttribute("data-i18n", "auth.switch_to_signup");
    } else {
      formTitle.setAttribute("data-i18n", "auth.signup_title");
      submitBtn.setAttribute("data-i18n", "auth.signup_btn");
      switchModeLink.setAttribute("data-i18n", "auth.switch_to_login");
    }
    applyI18n();
  }

  switchModeLink.addEventListener("click", (e) => {
    e.preventDefault();
    mode = mode === "login" ? "signup" : "login";
    errorMsg.classList.remove("visible");
    updateFormMode();
  });

  function showError(message) {
    errorMsg.textContent = message;
    errorMsg.classList.add("visible");
  }

  const REF_STORAGE_KEY = "pending_referral_code";

  async function claimReferralLink(newUser) {
    if (!newUser) return;

    // On tente jusqu'à 3 fois : si un autre utilisateur réserve le même lien
    // exactement au même moment, la policy RLS bloque le "USING (assigned_to IS NULL)"
    // et on retente avec un autre lien libre.
    for (let attempt = 0; attempt < 3; attempt++) {
      const { data: freeLinks, error: findError } = await supabaseClient
        .from("referral_links")
        .select("id")
        .is("assigned_to", null)
        .limit(1);

      if (findError || !freeLinks || freeLinks.length === 0) {
        console.warn("Aucun lien de parrainage disponible dans le pool.");
        return;
      }

      const { data: updated, error: updateError } = await supabaseClient
        .from("referral_links")
        .update({ assigned_to: newUser.id })
        .eq("id", freeLinks[0].id)
        .is("assigned_to", null)
        .select();

      if (!updateError && updated && updated.length > 0) {
        return; // lien réservé avec succès
      }
      // sinon, un autre utilisateur l'a pris entre-temps : on retente
    }

    console.warn("Impossible de réserver un lien après plusieurs tentatives.");
  }

  async function linkSignupToReferrer(newUser) {
    if (!newUser) return;
    const refCode = localStorage.getItem(REF_STORAGE_KEY);
    if (!refCode) return;

    try {
      const { data: referrer, error: findError } = await supabaseClient
        .from("users")
        .select("id")
        .eq("code_parrainage", refCode)
        .single();

      if (findError || !referrer) {
        console.warn("Code de parrainage inconnu à l'inscription :", refCode);
        return;
      }

      // Le trigger a déjà créé le profil "users" à l'inscription : on complète juste referred_by
      const { error: updateError } = await supabaseClient
        .from("users")
        .update({ referred_by: referrer.id })
        .eq("id", newUser.id);

      if (updateError) {
        console.error("Erreur liaison parrain :", updateError);
        return;
      }

      // Le code a fait son travail, on nettoie
      localStorage.removeItem(REF_STORAGE_KEY);
    } catch (err) {
      console.error("Erreur linkSignupToReferrer :", err);
    }
  }

  authForm.addEventListener("submit", async (e) => {
    e.preventDefault();
    errorMsg.classList.remove("visible");
    submitBtn.disabled = true;

    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value;

    try {
      let result;
      if (mode === "login") {
        result = await supabaseClient.auth.signInWithPassword({ email, password });
      } else {
        result = await supabaseClient.auth.signUp({ email, password });
      }

      if (result.error) {
        showError(result.error.message || t("auth.error_generic"));
        submitBtn.disabled = false;
        return;
      }

      // Si l'inscription vient de réussir, on relie le nouveau compte à son parrain
      // (le code a été mémorisé par index.html lors de la visite via ?ref=CODE)
      // et on lui réserve automatiquement un lien de paiement Stripe libre dans le pool
      if (mode === "signup") {
        await linkSignupToReferrer(result.data.user);
        await claimReferralLink(result.data.user);
      }

      // Succès : redirection vers le dashboard
      window.location.href = "dashboard.html";
    } catch (err) {
      console.error(err);
      showError(t("auth.error_generic"));
      submitBtn.disabled = false;
    }
  });

  document.addEventListener("DOMContentLoaded", () => {
    initThemeSelector();
    updateFormMode();
  });
</script>

</body>
</html>
