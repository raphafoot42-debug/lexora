<!DOCTYPE html>
<html lang="fr" data-theme="cyan">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Programme d'affiliation — Gagne 40€ par vente</title>
<link rel="stylesheet" href="themes.css" />
<link rel="stylesheet" href="styles.css" />
<style>
  .access-cards {
    display: flex;
    justify-content: center;
    gap: 32px;
    flex-wrap: wrap;
  }
  .access-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    width: 220px;
    height: 220px;
    border-radius: 20px;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(var(--accent-1-rgb), 0.3);
    text-decoration: none;
    transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
  }
  .access-card:hover {
    transform: translateY(-4px);
    border-color: var(--accent-1);
    box-shadow: 0 0 30px rgba(var(--accent-1-rgb), 0.35);
  }
  .access-card-title {
    font-size: 18px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.02em;
  }
</style>
</head>
<body>

<div class="bg-decor">
  <div class="bg-grid"></div>
  <div class="bg-chevrons">
    <svg viewBox="0 0 1000 1000" preserveAspectRatio="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M -20,20 L 220,500 L -20,980" />
      <path d="M 40,0 L 300,500 L 40,1000" />
      <path d="M 100,-20 L 380,500 L 100,1020" />
      <path d="M 160,-40 L 460,500 L 160,1040" />
      <path d="M 1020,20 L 780,500 L 1020,980" />
      <path d="M 960,0 L 700,500 L 960,1000" />
      <path d="M 900,-20 L 620,500 L 900,1020" />
      <path d="M 840,-40 L 540,500 L 840,1040" />
    </svg>
  </div>
  <div class="bg-aurora bg-aurora-1"></div>
  <div class="bg-aurora bg-aurora-2"></div>
  <div class="bg-aurora bg-aurora-3"></div>
  <canvas class="bg-particles"></canvas>
</div>

<!-- NAVBAR -->
<header class="navbar">
  <div class="container flex-between">
    <div class="navbar-left">
      <div class="logo gradient-text">Lexora</div>
      <div class="lang-select">
        <button class="lang-btn" data-lang="fr">FR</button>
        <button class="lang-btn" data-lang="en">EN</button>
      </div>
    </div>
    <div class="navbar-right">
      <div class="theme-dot-group" id="themeDotGroup"></div>
    </div>
  </div>
</header>

<!-- HERO -->
<section class="container" style="padding: 100px 24px; text-align: center;">
  <div class="access-cards">
    <a href="login.html" class="access-card">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-1)" stroke-width="1.7">
        <circle cx="12" cy="8" r="4"/>
        <path d="M4 21c0-4.4 3.6-7 8-7s8 2.6 8 7"/>
      </svg>
      <span class="access-card-title gradient-text" data-i18n="access.member">Espace Membre</span>
    </a>
    <a href="admin.html" class="access-card">
      <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="var(--accent-1)" stroke-width="1.7">
        <rect x="4" y="10" width="16" height="10" rx="2"/>
        <path d="M8 10V7a4 4 0 0 1 8 0v3"/>
      </svg>
      <span class="access-card-title gradient-text" data-i18n="access.admin">Espace Admin</span>
    </a>
  </div>
</section>

<script src="lang.js"></script>
<script src="decor.js"></script>
<script>
  // ---------- Thème ----------
  const THEMES = ["cyan", "violet", "emerald", "rose", "amber", "indigo"];
  const THEME_STORAGE_KEY = "site_theme";

  function getCurrentTheme() {
    return localStorage.getItem(THEME_STORAGE_KEY) || "cyan";
  }

  function setCurrentTheme(theme) {
    localStorage.setItem(THEME_STORAGE_KEY, theme);
    document.documentElement.setAttribute("data-theme", theme);
    updateThemeDots();
  }

  function updateThemeDots() {
    const current = getCurrentTheme();
    document.querySelectorAll(".theme-dot").forEach((dot) => {
      dot.classList.toggle("active", dot.getAttribute("data-theme-value") === current);
    });
  }

  function initThemeSelector() {
    const group = document.getElementById("themeDotGroup");
    const dotColors = {
      cyan: "#22d3ee", violet: "#a78bfa", emerald: "#34d399",
      rose: "#fb7185", amber: "#fbbf24", indigo: "#818cf8",
    };
    THEMES.forEach((theme) => {
      const dot = document.createElement("button");
      dot.className = "theme-dot";
      dot.setAttribute("data-theme-value", theme);
      dot.style.background = dotColors[theme];
      dot.addEventListener("click", () => setCurrentTheme(theme));
      group.appendChild(dot);
    });
    document.documentElement.setAttribute("data-theme", getCurrentTheme());
    updateThemeDots();
  }

  document.addEventListener("DOMContentLoaded", () => {
    initThemeSelector();
  });
</script>

</body>
</html>
