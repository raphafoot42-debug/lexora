<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script src="lang.js"></script>
<script src="decor.js"></script>
<script>
  // ---------- Tracking : visite via lien d'affiliation ----------
  const REF_STORAGE_KEY = "pending_referral_code";

  async function trackReferralVisit() {
    const params = new URLSearchParams(window.location.search);
    const refCode = params.get("ref");
    if (!refCode) return;

    // On garde le code en mémoire pour le relier à l'inscription plus tard
    localStorage.setItem(REF_STORAGE_KEY, refCode);

    // On évite de logger plusieurs fois la même visite dans la même session
    const sessionKey = "visit_logged_" + refCode;
    if (sessionStorage.getItem(sessionKey)) return;

    try {
      // On résout l'affilié à partir de son code pour stocker referrer_id
      const { data: referrer, error: findError } = await supabaseClient
        .from("users")
        .select("id")
        .eq("code_parrainage", refCode)
        .single();

      if (findError || !referrer) {
        console.warn("Code d'affiliation inconnu :", refCode);
        return;
      }

      const { error: insertError } = await supabaseClient
        .from("visits")
        .insert({ referral_code: refCode, referrer_id: referrer.id });

      if (insertError) {
        console.error("Erreur enregistrement visite :", insertError);
        return;
      }

      sessionStorage.setItem(sessionKey, "1");
    } catch (err) {
      console.error("Erreur tracking visite :", err);
    }
  }

  // ---------- Thème ----------
  const THEMES = ["cyan", "violet", "emerald", "rose", "amber", "indigo"];
  const THEME_STORAGE_KEY = "site_theme";

  function getCurrentTheme() {
    return localStorage.getItem(THEME_STORAGE_KEY) || "cyan";
  }

  function setCurrentTheme(theme) {
    localStorage.setItem(THEME_STORAGE_KEY, theme);
    document.documentElement.setAttribute("data-theme", theme);
    updateThemeDots();
  }

  function updateThemeDots() {
    const current = getCurrentTheme();
    document.querySelectorAll(".theme-dot").forEach((dot) => {
      dot.classList.toggle("active", dot.getAttribute("data-theme-value") === current);
    });
  }

  function initThemeSelector() {
    const group = document.getElementById("themeDotGroup");
    const dotColors = {
      cyan: "#22d3ee", violet: "#a78bfa", emerald: "#34d399",
      rose: "#fb7185", amber: "#fbbf24", indigo: "#818cf8",
    };
    THEMES.forEach((theme) => {
      const dot = document.createElement("button");
      dot.className = "theme-dot";
      dot.setAttribute("data-theme-value", theme);
      dot.style.background = dotColors[theme];
      dot.addEventListener("click", () => setCurrentTheme(theme));
      group.appendChild(dot);
    });
    document.documentElement.setAttribute("data-theme", getCurrentTheme());
    updateThemeDots();
  }

  document.addEventListener("DOMContentLoaded", () => {
    initThemeSelector();
    trackReferralVisit();
  });
</script>

</body>
